name: Wine Quality API CI

# This tells GitHub WHEN to run the pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This tells GitHub WHAT to do
jobs:
  build-and-test:
    runs-on: ubuntu-latest # Gives you a fresh Linux server

    steps:
    # Step 1: Download your repository's code onto the server
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Install Python 
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10" # You can change this to 3.9 or 3.11 if needed

    # Step 3: Install FastAPI, your ML libraries, and testing tools
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx 

    # Step 4: Run your automated tests
    - name: Run Pytest
      run: |
        pytest
